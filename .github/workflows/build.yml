name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install pyinstaller yt-dlp

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp
          $bin = (Get-ChildItem ffmpeg_tmp\ffmpeg-*\bin)[0].FullName
          Copy-Item "$bin\ffmpeg.exe"  ffmpeg.exe
          Copy-Item "$bin\ffprobe.exe" ffprobe.exe

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --collect-all yt_dlp --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --name YT-DLP-GUI ytdlp_gui.py

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "YT-DLP GUI - Latest Build"
          body: "Windows 免安装版，双击 YT-DLP-GUI.exe 即可使用，无需安装 Python 或 FFmpeg。"
          prerelease: false
          make_latest: true
          files: dist/YT-DLP-GUI.exe
